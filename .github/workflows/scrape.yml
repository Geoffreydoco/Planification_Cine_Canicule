name: Scrape Data

on:
  schedule:
    # 8h et 16h heure de Paris (UTC+2 en été)
    - cron: '0 6,14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update data
        run: python scripts/update_data.py

      - name: Commit sessions.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sessions.json
          git diff --cached --quiet || git commit -m "data: update sessions $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
