<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planificateur Ciné Canicule 🎬🌡️</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1a1a2e;
      --card:      #16213e;
      --accent:    #e94560;
      --text:      #e0e0e0;
      --muted:     #8888aa;
      --border:    #2a2a4a;

      --blue:      #3498db;
      --green:     #2ecc71;
      --orange:    #f39c12;
      --darkorange:#e67e22;
      --red:       #e74c3c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--card);
      border-bottom: 2px solid var(--accent);
      padding: 1.2rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
      flex: 0 0 auto;
    }

    #meta {
      font-size: 0.82rem;
      color: var(--muted);
      flex: 1 1 auto;
    }

    /* ── Refresh button ── */
    #btn-refresh {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.45rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: opacity .2s;
    }
    #btn-refresh:disabled { opacity: .5; cursor: default; }

    .toggle-btn { padding: 3px 10px; background: transparent; border: 1px solid #3a3a5a; color: #aaa; border-radius: 3px; cursor: pointer; font-size: 0.78rem; }
    .toggle-btn:hover { border-color: #e94560; color: #e94560; }

    /* ── Main layout ── */
    main {
      display: flex;
      gap: 0;
    }

    /* ── Sidebar ── */
    aside {
      width: 220px;
      flex-shrink: 0;
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 1.2rem 1rem;
      min-height: calc(100vh - 70px);
    }

    aside h2 {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .7rem;
    }

    /* View toggle */
    #view-toggle {
      display: flex;
      background: var(--bg);
      border-radius: 6px;
      padding: 3px;
      margin-bottom: 1.4rem;
      gap: 3px;
    }
    .view-btn {
      flex: 1;
      padding: .35rem .5rem;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .view-btn.active {
      background: var(--accent);
      color: #fff;
    }

    /* Filters */
    .filter-group { margin-bottom: 1.4rem; }

    .filter-group label {
      display: flex;
      align-items: center;
      gap: .45rem;
      font-size: 0.82rem;
      color: var(--text);
      padding: .2rem 0;
      cursor: pointer;
      word-break: break-word;
    }
    .filter-group input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px; height: 14px;
      flex-shrink: 0;
    }

    #film-search {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      padding: .4rem .55rem;
      font-size: 0.82rem;
    }
    #film-search::placeholder { color: var(--muted); }
    #film-search:focus { outline: none; border-color: var(--accent); }

    /* ── Summary bar ── */
    #summary-container {
      border-bottom: 1px solid var(--border);
    }

    /* ── Content area ── */
    #content {
      flex: 1;
      overflow-x: auto;
    }

    #view-container {
      padding: 1.4rem 1.5rem;
    }

    /* ── Section / group ── */
    .group { margin-bottom: 2rem; }

    .group-header {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: .6rem;
      padding-bottom: .35rem;
      border-bottom: 1px solid var(--border);
      text-transform: capitalize;
    }

    /* ── Table ── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead th {
      background: var(--card);
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: .5rem .75rem;
      text-align: left;
      position: sticky;
      top: 0;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    tbody tr:hover { filter: brightness(1.12); }

    tbody td {
      padding: .5rem .75rem;
      vertical-align: middle;
    }

    /* ── Temperature badge ── */
    .temp-badge {
      display: inline-block;
      padding: .15rem .5rem;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }

    /* ── Row color coding ── */
    .row-blue      { background: rgba(52,152,219,.08);  border-left: 3px solid #3498db; }
    .row-green     { background: rgba(46,204,113,.08);  border-left: 3px solid #2ecc71; }
    .row-orange    { background: rgba(243,156,18,.08);  border-left: 3px solid #f39c12; }
    .row-darkorange{ background: rgba(230,126,34,.08);  border-left: 3px solid #e67e22; }
    .row-red       { background: rgba(231,76,60,.08);   border-left: 3px solid #e74c3c; }
    .row-none      { border-left: 3px solid transparent; }

    /* ── Empty state ── */
    #empty-state {
      display: none;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }
    #empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    #empty-state p { font-size: 1rem; }

    /* ── Day nav ── */
    #day-nav {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 10px 16px;
      margin-bottom: 12px;
      scrollbar-width: thin;
      scrollbar-color: #3a3a5a transparent;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      aside { width: 100%; min-height: unset; border-right: none; border-bottom: 1px solid var(--border); }
      main  { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <h1>🎬 Planificateur Ciné Canicule</h1>
  <div id="meta">Chargement…</div>
  <button id="btn-refresh" onclick="doRefresh()">
    <span id="btn-label">🔄 Actualiser</span>
  </button>
</header>
<div id="progress-area" style="display:none;width:100%;padding:8px 24px;background:#0f3460;">
  <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
    <span id="progress-text" style="font-size:0.8rem;color:#aaa;"></span>
    <span id="progress-pct" style="font-size:0.8rem;color:#aaa;"></span>
  </div>
  <div style="background:#1a1a2e;border-radius:4px;height:8px;overflow:hidden;">
    <div id="progress-bar" style="height:100%;background:#e94560;width:0%;transition:width 0.3s ease;"></div>
  </div>
</div>

<main>
  <aside>
    <!-- View switch -->
    <h2>Vue</h2>
    <div id="view-toggle">
      <button class="view-btn active" id="btn-jour"   onclick="switchView('jour')">Par jour</button>
      <button class="view-btn"        id="btn-cinema" onclick="switchView('cinema')">Par cinéma</button>
    </div>

    <!-- Cinema filter -->
    <div class="filter-group">
      <h2>Cinémas</h2>
      <div style="display:flex;gap:8px;margin-bottom:6px;">
        <button class="toggle-btn" onclick="setCinemasAll(true)">Tout cocher</button>
        <button class="toggle-btn" onclick="setCinemasAll(false)">Tout décocher</button>
      </div>
      <div id="cinema-checks"></div>
    </div>

    <!-- Film search -->
    <div class="filter-group">
      <h2>Film</h2>
      <input type="text" id="film-search" placeholder="Rechercher…" oninput="applyFilters()">
    </div>

  </aside>

  <div id="content">
    <div id="summary-container"></div>
    <div id="view-container"></div>
    <div id="empty-state">
      <div class="empty-icon">🎞️</div>
      <p>Aucune séance ne correspond aux filtres sélectionnés.</p>
    </div>
  </div>
</main>

<script>
  const DATA = {{ sessions_json | safe }};

  /* ────────────────────────────────────────────
     State
  ──────────────────────────────────────────── */
  let currentView = 'jour';
  let selectedCinemas = new Set();
  let allCinemas = [];
  let selectedDay = null;  // null = auto-select first available day

  /* ────────────────────────────────────────────
     Temperature helpers
  ──────────────────────────────────────────── */
  function tempClass(t) {
    if (t === null || t === undefined) return 'none';
    if (t < 25)  return 'blue';
    if (t < 30)  return 'green';
    if (t < 35)  return 'orange';
    if (t < 39)  return 'darkorange';
    return 'red';
  }

  function tempColor(t) {
    const map = { blue:'#3498db', green:'#2ecc71', orange:'#f39c12', darkorange:'#e67e22', red:'#e74c3c' };
    return map[tempClass(t)] || null;
  }

  function tempBadge(t) {
    if (t === null || t === undefined) return '<span style="color:#666">—</span>';
    const color = tempColor(t);
    return `<span class="temp-badge" style="background:${color}">${t.toFixed(1)} °C</span>`;
  }

  /* ────────────────────────────────────────────
     Filter: only keep dates with at least one temp
  ──────────────────────────────────────────── */
  function getDatesWithTemperatures(sessions) {
    const datesWithTemp = new Set();
    sessions.forEach(s => {
      if (s.temperature !== null && s.temperature !== undefined) {
        datesWithTemp.add(s.date);
      }
    });
    return datesWithTemp;
  }

  /* ────────────────────────────────────────────
     Filtering
  ──────────────────────────────────────────── */
  function getFilteredSessions() {
    const filmQuery = document.getElementById('film-search').value.trim().toLowerCase();

    return DATA.sessions.filter(s => {
      // Cinema filter
      if (!selectedCinemas.has(s.cinema)) return false;
      // Film filter
      if (filmQuery && !s.film.toLowerCase().includes(filmQuery)) return false;
      return true;
    });
  }

  /* ────────────────────────────────────────────
     Row builder helpers
  ──────────────────────────────────────────── */
  function rowClass(t) {
    return 'row-' + tempClass(t);
  }

  function filmCell(s) {
    const escapedFilm = escHtml(s.film);
    const versionTag = `<small style="color:var(--muted)">${escHtml(s.version || '')}</small>`;
    if (s.film_url) {
      return `<a href="${escHtml(s.film_url)}" target="_blank" rel="noopener"
        style="color:#4fc3f7;text-decoration:none;"
        onmouseover="this.style.textDecoration='underline'"
        onmouseout="this.style.textDecoration='none'"
      >${escapedFilm}</a> ${versionTag}`;
    }
    return `${escapedFilm} ${versionTag}`;
  }

  function durationCell(s) {
    return s.duration
      ? `<span style="color:#888;font-size:0.82rem;">${escHtml(s.duration)}</span>`
      : `<span style="color:#555;font-size:0.82rem;">—</span>`;
  }

  // Vue A row: Cinema | Heure | Durée | Film | Temp
  function buildRowJour(s) {
    const cls = rowClass(s.temperature);
    return `<tr class="${cls}">
      <td>${escHtml(s.cinema)}</td>
      <td>${escHtml(s.heure)}</td>
      <td>${durationCell(s)}</td>
      <td>${filmCell(s)}</td>
      <td>${tempBadge(s.temperature)}</td>
    </tr>`;
  }

  // Vue B row: Date | Heure | Durée | Film | Temp
  function buildRowCinema(s) {
    const cls = rowClass(s.temperature);
    const dateStr = new Date(s.date + 'T12:00:00').toLocaleDateString('fr-FR', {weekday:'short', day:'numeric', month:'short'});
    return `<tr class="${cls}">
      <td>${dateStr}</td>
      <td>${escHtml(s.heure)}</td>
      <td>${durationCell(s)}</td>
      <td>${filmCell(s)}</td>
      <td>${tempBadge(s.temperature)}</td>
    </tr>`;
  }

  function escHtml(str) {
    return String(str ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  /* ────────────────────────────────────────────
     Temperature summary bar (Vue A only)
  ──────────────────────────────────────────── */
  function renderTempSummary(sessions) {
    const datesWithTemp = getDatesWithTemperatures(sessions);
    const byDate = {};
    sessions.forEach(s => {
      if (datesWithTemp.has(s.date) && s.temperature !== null && s.temperature !== undefined) {
        (byDate[s.date] = byDate[s.date] || []).push(s.temperature);
      }
    });
    const dates = Object.keys(byDate).sort();
    if (!dates.length) return '';

    const items = dates.map(date => {
      const temps = byDate[date];
      const min = Math.round(Math.min(...temps));
      const max = Math.round(Math.max(...temps));
      const d = new Date(date + 'T12:00:00');
      const label = d.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric' });
      const borderColor = tempColor(max) || '#555';
      const isActive = date === selectedDay;
      const activeBg = isActive ? 'background:rgba(233,69,96,0.15);' : '';
      return `<div onclick="selectDay('${date}')" style="text-align:center;padding:6px 12px;border-radius:6px;border:1px solid ${borderColor};min-width:72px;cursor:pointer;transition:background 0.15s;${activeBg}">
          <div style="font-size:0.72rem;color:#aaa;margin-bottom:3px;">${label}</div>
          <div style="font-size:0.85rem;color:#e0e0e0;">${min}°–${max}°</div>
        </div>`;
    }).join('');

    return `<div style="display:flex;gap:8px;overflow-x:auto;padding:10px 24px;background:#0f3460;scrollbar-width:thin;scrollbar-color:#3a3a5a transparent;">${items}</div>`;
  }

  /* ────────────────────────────────────────────
     Day selector
  ──────────────────────────────────────────── */
  function selectDay(date) {
    selectedDay = date;
    applyFilters();
    // Scroll active day button into view after render
    setTimeout(() => {
      const nav = document.getElementById('day-nav');
      if (nav) {
        const active = nav.querySelector('button[data-active="1"]');
        if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }, 50);
  }

  /* ────────────────────────────────────────────
     Render Vue A — Par jour (horizontal day nav)
  ──────────────────────────────────────────── */
  function renderViewJour(sessions) {
    // Only include dates that have at least one temperature
    const datesWithTemp = getDatesWithTemperatures(DATA.sessions);

    const groups = {};
    for (const s of sessions) {
      if (!datesWithTemp.has(s.date)) continue;
      if (!groups[s.date]) groups[s.date] = [];
      groups[s.date].push(s);
    }
    const dates = Object.keys(groups).sort();

    if (dates.length === 0) return '<div style="padding:4rem 2rem;text-align:center;color:var(--muted)">Aucune séance avec données météo disponibles.</div>';

    // Ensure selectedDay is valid
    if (!selectedDay || !dates.includes(selectedDay)) {
      selectedDay = dates[0];
    }

    // Build horizontal day nav
    const navHtml = dates.map(date => {
      const d = new Date(date + 'T12:00:00');
      const dayLabel = d.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });
      const isActive = date === selectedDay;
      return `<button data-active="${isActive ? '1' : '0'}" onclick="selectDay('${date}')" style="
          white-space:nowrap;padding:6px 14px;border-radius:20px;border:1px solid;
          cursor:pointer;font-size:0.82rem;transition:all 0.2s;
          ${isActive
            ? 'background:#e94560;color:#fff;border-color:#e94560;'
            : 'background:transparent;color:#aaa;border-color:#3a3a5a;'}
        ">${dayLabel}</button>`;
    }).join('');

    // Show only selected day's sessions
    const daySessions = (groups[selectedDay] || []).slice().sort(
      (a, b) => a.cinema.localeCompare(b.cinema) || a.heure.localeCompare(b.heure)
    );
    const rowsHtml = daySessions.map(buildRowJour).join('');

    const d = new Date(selectedDay + 'T12:00:00');
    const fullLabel = d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
    const capitalized = fullLabel.charAt(0).toUpperCase() + fullLabel.slice(1);

    return `<div id="day-nav">${navHtml}</div>
      <div class="group">
        <div class="group-header">${capitalized}</div>
        <table>
          <thead><tr>
            <th>Cinéma</th><th>Heure</th><th>Durée</th><th>Film</th><th>🌡️</th>
          </tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>`;
  }

  /* ────────────────────────────────────────────
     Render Vue B — Par cinéma
  ──────────────────────────────────────────── */
  function renderViewCinema(sessions) {
    const groups = {};
    for (const s of sessions) {
      if (!groups[s.cinema]) groups[s.cinema] = [];
      groups[s.cinema].push(s);
    }
    const cinemas = Object.keys(groups).sort();

    if (cinemas.length === 0) return '';

    return cinemas.map(cinema => {
      const rows = groups[cinema].slice().sort((a,b) => {
        const d = a.date.localeCompare(b.date);
        return d !== 0 ? d : a.heure.localeCompare(b.heure);
      });
      const rowsHtml = rows.map(buildRowCinema).join('');
      return `<div class="group">
        <div class="group-header">${escHtml(cinema)}</div>
        <table>
          <thead><tr>
            <th>Date</th><th>Heure</th><th>Durée</th><th>Film</th><th>🌡️</th>
          </tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>`;
    }).join('');
  }

  /* ────────────────────────────────────────────
     Apply filters + re-render
  ──────────────────────────────────────────── */
  function applyFilters() {
    const sessions = getFilteredSessions();
    const container = document.getElementById('view-container');
    const summaryEl = document.getElementById('summary-container');
    const empty     = document.getElementById('empty-state');

    // Summary bar — only in jour view, uses ALL sessions (not filtered by cinema/film)
    if (summaryEl) {
      summaryEl.innerHTML = (currentView === 'jour') ? renderTempSummary(getFilteredSessions()) : '';
    }

    let html = '';
    if (currentView === 'jour') {
      html = renderViewJour(sessions);
    } else {
      html = renderViewCinema(sessions);
    }

    if (!html) {
      container.innerHTML = '';
      empty.style.display = 'block';
    } else {
      container.innerHTML = html;
      empty.style.display = 'none';
    }
  }

  /* ────────────────────────────────────────────
     View switch
  ──────────────────────────────────────────── */
  function switchView(view) {
    currentView = view;
    document.getElementById('btn-jour').classList.toggle('active',   view === 'jour');
    document.getElementById('btn-cinema').classList.toggle('active', view === 'cinema');
    applyFilters();
  }

  /* ────────────────────────────────────────────
     Refresh
  ──────────────────────────────────────────── */
  async function doRefresh() {
    const btn = document.getElementById('btn-refresh');
    const progressArea = document.getElementById('progress-area');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');

    btn.disabled = true;
    btn.textContent = 'Actualisation...';
    progressArea.style.display = 'block';
    progressBar.style.width = '0%';
    progressText.textContent = 'Démarrage...';

    try {
      const startResp = await fetch('/refresh', { method: 'POST' });
      if (!startResp.ok) {
        const err = await startResp.json();
        if (err.status === 'already_running') {
          progressText.textContent = 'Actualisation déjà en cours...';
          pollProgress();
          return;
        }
        throw new Error('Erreur démarrage: ' + startResp.status);
      }
      pollProgress();
    } catch (e) {
      alert('Erreur : ' + e.message);
      btn.disabled = false;
      btn.textContent = '🔄 Actualiser';
      progressArea.style.display = 'none';
    }
  }

  function pollProgress() {
    const btn = document.getElementById('btn-refresh');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');

    const interval = setInterval(async () => {
      try {
        const resp = await fetch('/progress');
        const state = await resp.json();
        const pct = state.total > 0 ? Math.round(state.current / state.total * 100) : 0;
        progressBar.style.width = pct + '%';
        progressText.textContent = state.cinema
          ? `${state.current}/${state.total} — ${state.cinema}`
          : 'En cours...';

        if (state.done) {
          clearInterval(interval);
          if (state.error) {
            alert('Erreur lors du scraping : ' + state.error);
            btn.disabled = false;
            btn.textContent = '🔄 Actualiser';
            document.getElementById('progress-area').style.display = 'none';
          } else {
            window.location.reload();
          }
        }
      } catch (e) {
        clearInterval(interval);
        alert('Erreur réseau : ' + e.message);
        btn.disabled = false;
        btn.textContent = '🔄 Actualiser';
        document.getElementById('progress-area').style.display = 'none';
      }
    }, 2000);
  }

  function setCinemasAll(checked) {
    document.querySelectorAll('#cinema-checks input[type="checkbox"]').forEach(cb => cb.checked = checked);
    if (checked) {
      allCinemas.forEach(c => selectedCinemas.add(c));
    } else {
      selectedCinemas.clear();
    }
    applyFilters();
  }

  /* ────────────────────────────────────────────
     Init
  ──────────────────────────────────────────── */
  function init() {
    // Meta info
    const metaEl = document.getElementById('meta');
    if (DATA.updated_at) {
      const dt = new Date(DATA.updated_at).toLocaleString('fr-FR');
      const n  = DATA.sessions.length;
      metaEl.textContent = `Mis à jour : ${dt} — ${n} séance${n !== 1 ? 's' : ''}`;
    } else {
      metaEl.textContent = 'Aucune donnée — cliquez sur Actualiser';
    }

    // Build cinema checkboxes
    allCinemas = [...new Set(DATA.sessions.map(s => s.cinema))].sort();
    selectedCinemas = new Set(allCinemas);

    const container = document.getElementById('cinema-checks');
    if (allCinemas.length === 0) {
      container.innerHTML = '<span style="color:var(--muted);font-size:.8rem">Aucun cinéma</span>';
    } else {
      container.innerHTML = allCinemas.map(c => {
        const id = 'chk-' + c.replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-]/g, '');
        return `<label>
          <input type="checkbox" id="${id}" value="${escHtml(c)}" checked
            onchange="toggleCinema('${escHtml(c)}', this.checked)">
          ${escHtml(c)}
        </label>`;
      }).join('');
    }

    // Initial render
    applyFilters();
  }

  function toggleCinema(cinema, checked) {
    if (checked) {
      selectedCinemas.add(cinema);
    } else {
      selectedCinemas.delete(cinema);
    }
    applyFilters();
  }

  init();
</script>
</body>
</html>
