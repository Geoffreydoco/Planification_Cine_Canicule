<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planificateur Ciné Canicule 🎬🌡️</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1a1a2e;
      --card:      #16213e;
      --accent:    #e94560;
      --text:      #e0e0e0;
      --muted:     #8888aa;
      --border:    #2a2a4a;

      --blue:      #3498db;
      --green:     #2ecc71;
      --orange:    #f39c12;
      --darkorange:#e67e22;
      --red:       #e74c3c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--card);
      border-bottom: 2px solid var(--accent);
      padding: 1.2rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
      flex: 0 0 auto;
    }

    #meta {
      font-size: 0.82rem;
      color: var(--muted);
      flex: 1 1 auto;
    }

    .toggle-btn { padding: 3px 10px; background: transparent; border: 1px solid #3a3a5a; color: #aaa; border-radius: 3px; cursor: pointer; font-size: 0.78rem; }
    .toggle-btn:hover { border-color: #e94560; color: #e94560; }

    /* ── Main layout ── */
    main {
      display: flex;
      gap: 0;
    }

    /* ── Sidebar ── */
    aside {
      width: 220px;
      flex-shrink: 0;
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 1.2rem 1rem;
      min-height: calc(100vh - 70px);
    }

    aside h2 {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .7rem;
    }

    /* View toggle */
    #view-toggle {
      display: flex;
      background: var(--bg);
      border-radius: 6px;
      padding: 3px;
      margin-bottom: 1.4rem;
      gap: 3px;
    }
    .view-btn {
      flex: 1;
      padding: .35rem .5rem;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .view-btn.active {
      background: var(--accent);
      color: #fff;
    }

    /* Filters */
    .filter-group { margin-bottom: 1.4rem; }

    .filter-group label {
      display: flex;
      align-items: center;
      gap: .45rem;
      font-size: 0.82rem;
      color: var(--text);
      padding: .2rem 0;
      cursor: pointer;
      word-break: break-word;
    }
    .filter-group input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px; height: 14px;
      flex-shrink: 0;
    }

    #film-search {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      padding: .4rem .55rem;
      font-size: 0.82rem;
    }
    #film-search::placeholder { color: var(--muted); }
    #film-search:focus { outline: none; border-color: var(--accent); }

    /* ── Summary bar ── */
    #summary-container {
      border-bottom: 1px solid var(--border);
    }

    /* ── Content area ── */
    #content {
      flex: 1;
      overflow-x: auto;
    }

    #view-container {
      padding: 1.4rem 1.5rem;
    }

    /* ── Section / group ── */
    .group { margin-bottom: 2rem; }

    .group-header {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: .6rem;
      padding-bottom: .35rem;
      border-bottom: 1px solid var(--border);
      text-transform: capitalize;
    }

    /* ── Table ── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead th {
      background: var(--card);
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: .5rem .75rem;
      text-align: left;
      position: sticky;
      top: 0;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    tbody tr:hover { filter: brightness(1.12); }

    tbody td {
      padding: .5rem .75rem;
      vertical-align: middle;
    }

    /* ── Temperature badge ── */
    .temp-badge {
      display: inline-block;
      padding: .15rem .5rem;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }

    /* ── Calendar button ── */
    .cal-btn {
      display: inline-flex;
      align-items: center;
      background: transparent;
      border: 1px solid #3a3a5a;
      color: #888;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.72rem;
      cursor: pointer;
      text-decoration: none;
      line-height: 1.4;
      transition: border-color .15s, color .15s;
    }
    .cal-btn:hover {
      border-color: #e94560;
      color: #e94560;
    }

    /* ── Row color coding ── */
    .row-blue      { background: rgba(52,152,219,.08);  border-left: 3px solid #3498db; }
    .row-green     { background: rgba(46,204,113,.08);  border-left: 3px solid #2ecc71; }
    .row-orange    { background: rgba(243,156,18,.08);  border-left: 3px solid #f39c12; }
    .row-darkorange{ background: rgba(230,126,34,.08);  border-left: 3px solid #e67e22; }
    .row-red       { background: rgba(231,76,60,.08);   border-left: 3px solid #e74c3c; }
    .row-none      { border-left: 3px solid transparent; }

    /* ── Empty state ── */
    #empty-state {
      display: none;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }
    #empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    #empty-state p { font-size: 1rem; }

    /* ── Day nav ── */
    #day-nav {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 10px 16px;
      margin-bottom: 12px;
      scrollbar-width: thin;
      scrollbar-color: #3a3a5a transparent;
    }

    /* ── Film tooltip ── */
    #film-tooltip {
      display: none;
      position: fixed;
      z-index: 9999;
      width: min(340px, calc(100vw - 24px));
      max-height: calc(100vh - 24px);
      overflow-y: auto;
      background: #0f1b35;
      border: 1px solid #2a3a6a;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,.7);
      padding: 12px;
      pointer-events: none;
    }
    #film-tooltip img {
      width: 100%;
      max-height: min(240px, 35vh);
      object-fit: contain;
      border-radius: 6px;
      margin-bottom: 8px;
      display: block;
    }
    #film-tooltip .tt-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: #e0e0e0;
      margin-bottom: 6px;
    }
    #film-tooltip .tt-synopsis {
      font-size: 0.78rem;
      color: #9999bb;
      line-height: 1.5;
      max-height: min(140px, 22vh);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 7;
      -webkit-box-orient: vertical;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      aside { width: 100%; min-height: unset; border-right: none; border-bottom: 1px solid var(--border); }
      main  { flex-direction: column; }
    }
  </style>
</head>
<body>

<div id="film-tooltip">
  <img id="tt-img" src="" alt="">
  <div class="tt-title" id="tt-title"></div>
  <div class="tt-synopsis" id="tt-synopsis"></div>
</div>

<header>
  <h1>🎬 Planificateur Ciné Canicule</h1>
  <div id="meta">Chargement…</div>
</header>

<main>
  <aside>
    <!-- View switch -->
    <h2>Vue</h2>
    <div id="view-toggle">
      <button class="view-btn active" id="btn-jour"   onclick="switchView('jour')">Par jour</button>
      <button class="view-btn"        id="btn-cinema" onclick="switchView('cinema')">Par cinéma</button>
    </div>

    <!-- Cinema filter -->
    <div class="filter-group">
      <h2>Cinémas</h2>
      <div style="display:flex;gap:8px;margin-bottom:6px;">
        <button class="toggle-btn" onclick="setCinemasAll(true)">Tout cocher</button>
        <button class="toggle-btn" onclick="setCinemasAll(false)">Tout décocher</button>
      </div>
      <div id="cinema-checks"></div>
    </div>

    <!-- Film search -->
    <div class="filter-group">
      <h2>Film</h2>
      <input type="text" id="film-search" placeholder="Rechercher…" oninput="applyFilters()">
    </div>

    <!-- Group by film toggle + advanced info -->
    <div class="filter-group">
      <h2>Options</h2>
      <label style="display:flex;align-items:center;gap:.45rem;font-size:0.82rem;color:var(--text);cursor:pointer;">
        <input type="checkbox" id="group-by-film" checked
               onchange="groupByFilm=this.checked;applyFilters()"
               style="accent-color:var(--accent);width:14px;height:14px;flex-shrink:0;">
        Regrouper par film
      </label>
      <label style="display:flex;align-items:center;gap:.45rem;font-size:0.82rem;color:var(--text);cursor:pointer;margin-top:.35rem;">
        <input type="checkbox" id="show-advanced"
               onchange="showAdvancedInfo=this.checked;applyFilters()"
               style="accent-color:var(--accent);width:14px;height:14px;flex-shrink:0;">
        Infos avancées
      </label>
    </div>

  </aside>

  <div id="content">
    <div id="summary-container"></div>
    <div id="view-container"></div>
    <div id="empty-state">
      <div class="empty-icon">🎞️</div>
      <p>Aucune séance ne correspond aux filtres sélectionnés.</p>
    </div>
  </div>
</main>

<script>
  let DATA = null;

  /* ────────────────────────────────────────────
     State
  ──────────────────────────────────────────── */
  let currentView = 'jour';
  let selectedCinemas = new Set();
  let allCinemas = [];
  let selectedDay = null;  // null = auto-select first available day
  let groupByFilm = true;
  let showAdvancedInfo = false;

  /* ────────────────────────────────────────────
     Temperature helpers
  ──────────────────────────────────────────── */
  function tempClass(t) {
    if (t === null || t === undefined) return 'none';
    if (t < 25)  return 'blue';
    if (t < 30)  return 'green';
    if (t < 35)  return 'orange';
    if (t < 39)  return 'darkorange';
    return 'red';
  }

  function tempColor(t) {
    const map = { blue:'#3498db', green:'#2ecc71', orange:'#f39c12', darkorange:'#e67e22', red:'#e74c3c' };
    return map[tempClass(t)] || null;
  }

  function tempBadge(t) {
    if (t === null || t === undefined) return '<span style="color:#666">—</span>';
    const color = tempColor(t);
    return `<span class="temp-badge" style="background:${color}">${t.toFixed(1)} °C</span>`;
  }

  /* ────────────────────────────────────────────
     Filter: only keep dates with at least one temp
  ──────────────────────────────────────────── */
  function getDatesWithTemperatures(sessions) {
    const datesWithTemp = new Set();
    sessions.forEach(s => {
      if (s.temperature !== null && s.temperature !== undefined) {
        datesWithTemp.add(s.date);
      }
    });
    return datesWithTemp;
  }

  /* ────────────────────────────────────────────
     Filtering
  ──────────────────────────────────────────── */
  function getFilteredSessions() {
    const filmQuery = document.getElementById('film-search').value.trim().toLowerCase();

    return DATA.sessions.filter(s => {
      // Cinema filter
      if (!selectedCinemas.has(s.cinema)) return false;
      // Film filter
      if (filmQuery && !s.film.toLowerCase().includes(filmQuery)) return false;
      return true;
    });
  }

  /* ────────────────────────────────────────────
     Row builder helpers
  ──────────────────────────────────────────── */
  function rowClass(t) {
    return 'row-' + tempClass(t);
  }

  // ── Film tooltip ──────────────────────────────────────────────
  const tooltip   = document.getElementById('film-tooltip');
  const ttImg     = document.getElementById('tt-img');
  const ttTitle   = document.getElementById('tt-title');
  const ttSynopsis= document.getElementById('tt-synopsis');

  function showTooltip(e, s) {
    ttTitle.textContent   = s.film || '';
    ttSynopsis.textContent= s.synopsis || '(pas de synopsis disponible)';
    if (s.poster_url) {
      ttImg.src   = s.poster_url;
      ttImg.style.display = 'block';
    } else {
      ttImg.style.display = 'none';
    }
    positionTooltip(e);
    tooltip.style.display = 'block';
  }

  function positionTooltip(e) {
    const gap  = 14;
    const pad  = 8;
    const vw   = window.innerWidth;
    const vh   = window.innerHeight;
    const tw   = tooltip.offsetWidth  || 340;
    const th   = tooltip.offsetHeight || 280;

    // Prefer right of cursor, fall back to left
    let x = e.clientX + gap;
    if (x + tw > vw - pad) x = e.clientX - tw - gap;

    // Prefer below cursor, fall back to above
    let y = e.clientY + gap;
    if (y + th > vh - pad) y = e.clientY - th - gap;

    // Hard clamp so it never exits the viewport
    x = Math.max(pad, Math.min(x, vw - tw - pad));
    y = Math.max(pad, Math.min(y, vh - th - pad));

    tooltip.style.left = x + 'px';
    tooltip.style.top  = y + 'px';
  }

  document.addEventListener('mousemove', e => {
    if (tooltip.style.display === 'block') positionTooltip(e);
  });

  function hideTooltip() {
    tooltip.style.display = 'none';
  }

  // Attach tooltip to a span wrapping the film name; used in filmCell
  let _tooltipSessions = {};
  function registerTooltip(key, s) { _tooltipSessions[key] = s; }

  function filmCell(s) {
    const escapedFilm = escHtml(s.film);
    const versionTag = `<small style="color:var(--muted)">${escHtml(s.version || '')}</small>`;
    const hasInfo = s.poster_url || s.synopsis;
    const cursor  = hasInfo ? 'help' : 'default';

    // Encode data directly as JSON attributes to avoid a registry lookup
    const dataFilm     = escHtml(JSON.stringify(s.film     || ''));
    const dataSynopsis = escHtml(JSON.stringify(s.synopsis || ''));
    const dataPoster   = escHtml(JSON.stringify(s.poster_url || ''));

    const hoverAttrs = hasInfo
      ? `onmouseenter="ttShow(event,this)" onmouseleave="ttHide()"`
      : '';
    const spanStyle = `cursor:${cursor};`;

    const inner = `<span
      style="${spanStyle}"
      data-film="${dataFilm}"
      data-synopsis="${dataSynopsis}"
      data-poster="${dataPoster}"
      ${hoverAttrs}
    >${escapedFilm}</span>`;

    if (s.film_url) {
      return `<a href="${escHtml(s.film_url)}" target="_blank" rel="noopener"
        style="color:#4fc3f7;text-decoration:none;"
        onmouseover="this.style.textDecoration='underline'"
        onmouseout="this.style.textDecoration='none'"
      >${inner}</a> ${versionTag}`;
    }
    return `${inner} ${versionTag}`;
  }

  function ttShow(e, el) {
    ttTitle.textContent    = JSON.parse(el.dataset.film     || '""');
    ttSynopsis.textContent = JSON.parse(el.dataset.synopsis || '""') || '(pas de synopsis disponible)';
    const poster = JSON.parse(el.dataset.poster || '""');
    if (poster) {
      ttImg.src = poster;
      ttImg.style.display = 'block';
    } else {
      ttImg.style.display = 'none';
    }
    positionTooltip(e);
    tooltip.style.display = 'block';
  }

  function ttHide() { tooltip.style.display = 'none'; }

  function durationCell(s) {
    return s.duration
      ? `<span style="color:#888;font-size:0.82rem;">${escHtml(s.duration)}</span>`
      : `<span style="color:#555;font-size:0.82rem;">—</span>`;
  }

  function advancedCells(s) {
    if (!showAdvancedInfo) return '';
    const director = escHtml(s.director || '—');
    const userRating = s.user_rating != null ? `⭐ ${s.user_rating.toFixed(1)}` : '—';
    const pressRating = s.press_rating != null ? `📰 ${s.press_rating.toFixed(1)}` : '—';
    const genres = s.genres && s.genres.length ? escHtml(s.genres.join(', ')) : '—';
    const actors = s.actors && s.actors.length ? escHtml(s.actors.slice(0, 3).join(', ')) : '—';
    const cell = 'font-size:0.78rem;color:#ccc;white-space:nowrap;';
    return `<td style="${cell}">${director}</td>
      <td style="${cell}">${userRating}</td>
      <td style="${cell}">${pressRating}</td>
      <td style="font-size:0.78rem;color:#aaa;">${genres}</td>
      <td style="font-size:0.78rem;color:#ccc;">${actors}</td>`;
  }

  function advancedHeaders() {
    if (!showAdvancedInfo) return '';
    return '<th>Réalisateur</th><th>Public</th><th>Presse</th><th>Genres</th><th>Acteurs</th>';
  }

  // Vue A row: Cinema | Heure | Durée | Film | [avancé] | Temp | 📅
  function buildRowJour(s) {
    const cls = rowClass(s.temperature);
    return `<tr class="${cls}">
      <td>${escHtml(s.cinema)}</td>
      <td>${escHtml(s.heure)}</td>
      <td>${durationCell(s)}</td>
      <td>${filmCell(s)}</td>
      ${advancedCells(s)}
      <td>${tempBadge(s.temperature)}</td>
      <td>${calBtn(s)}</td>
    </tr>`;
  }

  // Vue B row: Date | Heure | Durée | Film | [avancé] | Temp | 📅
  function buildRowCinema(s) {
    const cls = rowClass(s.temperature);
    const dateStr = new Date(s.date + 'T12:00:00').toLocaleDateString('fr-FR', {weekday:'short', day:'numeric', month:'short'});
    return `<tr class="${cls}">
      <td>${dateStr}</td>
      <td>${escHtml(s.heure)}</td>
      <td>${durationCell(s)}</td>
      <td>${filmCell(s)}</td>
      ${advancedCells(s)}
      <td>${tempBadge(s.temperature)}</td>
      <td>${calBtn(s)}</td>
    </tr>`;
  }

  function escHtml(str) {
    return String(str ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  /* ────────────────────────────────────────────
     Group-by-film helpers
  ──────────────────────────────────────────── */
  function maxTemp(sessions) {
    const temps = sessions.map(s => s.temperature).filter(t => t !== null && t !== undefined);
    return temps.length ? Math.max(...temps) : null;
  }

  function sessionBadge(s) {
    const time = escHtml(s.heure);
    let badge;
    if (s.temperature === null || s.temperature === undefined) {
      badge = `<span style="white-space:nowrap;font-size:0.82rem;color:#aaa">${time}</span>`;
    } else {
      const color = tempColor(s.temperature);
      badge = `<span style="white-space:nowrap;font-size:0.82rem;">${time}&nbsp;<span class="temp-badge" style="background:${color}">${s.temperature.toFixed(1)}&nbsp;°C</span></span>`;
    }
    return `<span style="white-space:nowrap;display:inline-flex;align-items:center;gap:3px;">${badge}${calBtn(s)}</span>`;
  }

  function seancesCell(sessions) {
    const sorted = sessions.slice().sort((a, b) => a.heure.localeCompare(b.heure));
    return `<div style="display:flex;flex-wrap:wrap;gap:6px 10px;">${sorted.map(sessionBadge).join('')}</div>`;
  }

  function buildGroupedRowJour(group) {
    const t = maxTemp(group.sessions);
    const cls = rowClass(t);
    const rep = group.sessions[0];
    return `<tr class="${cls}">
      <td>${escHtml(group.cinema)}</td>
      <td>${filmCell(rep)}</td>
      <td>${durationCell(rep)}</td>
      ${advancedCells(rep)}
      <td>${seancesCell(group.sessions)}</td>
    </tr>`;
  }

  function buildGroupedRowCinema(group) {
    const t = maxTemp(group.sessions);
    const cls = rowClass(t);
    const rep = group.sessions[0];
    const dateStr = new Date(group.date + 'T12:00:00').toLocaleDateString('fr-FR', {weekday:'short', day:'numeric', month:'short'});
    return `<tr class="${cls}">
      <td>${dateStr}</td>
      <td>${filmCell(rep)}</td>
      <td>${durationCell(rep)}</td>
      ${advancedCells(rep)}
      <td>${seancesCell(group.sessions)}</td>
    </tr>`;
  }

  /* ────────────────────────────────────────────
     Google Agenda helpers
  ──────────────────────────────────────────── */
  function calendarUrl(s) {
    function parseDuration(dur) {
      if (!dur) return 120;
      const h = dur.match(/(\d+)\s*h/i);
      const m = dur.match(/(\d+)\s*min/i) || dur.match(/h\s*(\d+)$/);
      const hours = h ? parseInt(h[1], 10) : 0;
      const mins  = m ? parseInt(m[1], 10) : 0;
      const total = hours * 60 + mins;
      return total > 0 ? total : 120;
    }

    function toGCalStamp(dateStr, heureStr) {
      return dateStr.replace(/-/g, '') + 'T' + heureStr.replace(':', '') + '00';
    }

    function addMinutes(dateStr, heureStr, minutes) {
      const [h, m] = heureStr.split(':').map(Number);
      const totalMin = h * 60 + m + minutes;
      const newH    = Math.floor(totalMin / 60) % 24;
      const newM    = totalMin % 60;
      const dayOver = Math.floor(totalMin / 1440);
      let endDate   = dateStr;
      if (dayOver > 0) {
        const d = new Date(dateStr + 'T12:00:00');
        d.setDate(d.getDate() + dayOver);
        endDate = d.toISOString().slice(0, 10);
      }
      return endDate.replace(/-/g, '') + 'T' + String(newH).padStart(2,'0') + String(newM).padStart(2,'0') + '00';
    }

    const durationMin = parseDuration(s.duration);
    const start  = toGCalStamp(s.date, s.heure);
    const end    = addMinutes(s.date, s.heure, durationMin);
    const title  = s.film + (s.version ? ' (' + s.version + ')' : '');
    const detail = s.film + (s.version ? ' - ' + s.version : '');

    return 'https://calendar.google.com/calendar/render?action=TEMPLATE'
      + '&text='     + encodeURIComponent(title)
      + '&dates='    + encodeURIComponent(start + '/' + end)
      + '&location=' + encodeURIComponent(s.cinema)
      + '&details='  + encodeURIComponent(detail);
  }

  function calBtn(s) {
    return `<a href="${escHtml(calendarUrl(s))}" target="_blank" rel="noopener" class="cal-btn" title="Ajouter à Google Agenda">📅</a>`;
  }

  /* ────────────────────────────────────────────
     Temperature summary bar (Vue A only)
  ──────────────────────────────────────────── */
  function renderTempSummary(sessions) {
    const dailyTemps = DATA.daily_temps || {};
    // Only show dates that have at least one session in the filtered set
    const datesWithSession = new Set(sessions.map(s => s.date));
    const dates = Object.keys(dailyTemps).filter(d => datesWithSession.has(d)).sort();
    if (!dates.length) return '';

    const items = dates.map(date => {
      const dt = dailyTemps[date];
      if (!dt) return '';
      const min = Math.round(dt.min);
      const max = Math.round(dt.max);
      const d = new Date(date + 'T12:00:00');
      const label = d.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric' });
      const borderColor = tempColor(max) || '#555';
      const isActive = currentView === 'jour' && date === selectedDay;
      const activeBg = isActive ? 'background:rgba(233,69,96,0.15);' : '';
      const clickAttr = currentView === 'jour' ? `onclick="selectDay('${date}')"` : '';
      const cursor = currentView === 'jour' ? 'cursor:pointer;' : '';
      return `<div ${clickAttr} style="text-align:center;padding:6px 12px;border-radius:6px;border:1px solid ${borderColor};min-width:72px;${cursor}transition:background 0.15s;${activeBg}">
          <div style="font-size:0.72rem;color:#aaa;margin-bottom:3px;">${label}</div>
          <div style="font-size:0.85rem;color:#e0e0e0;">${min}°–${max}°</div>
        </div>`;
    }).filter(Boolean).join('');

    return `<div style="display:flex;gap:8px;overflow-x:auto;padding:10px 24px;background:#0f3460;scrollbar-width:thin;scrollbar-color:#3a3a5a transparent;">${items}</div>`;
  }

  /* ────────────────────────────────────────────
     Day selector
  ──────────────────────────────────────────── */
  function selectDay(date) {
    selectedDay = date;
    applyFilters();
    // Scroll active day button into view after render
    setTimeout(() => {
      const nav = document.getElementById('day-nav');
      if (nav) {
        const active = nav.querySelector('button[data-active="1"]');
        if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }, 50);
  }

  /* ────────────────────────────────────────────
     Render Vue A — Par jour (horizontal day nav)
  ──────────────────────────────────────────── */
  function renderViewJour(sessions) {
    // Only include dates that have at least one temperature
    const datesWithTemp = getDatesWithTemperatures(DATA.sessions);

    const groups = {};
    for (const s of sessions) {
      if (!datesWithTemp.has(s.date)) continue;
      if (!groups[s.date]) groups[s.date] = [];
      groups[s.date].push(s);
    }
    const dates = Object.keys(groups).sort();

    if (dates.length === 0) return '<div style="padding:4rem 2rem;text-align:center;color:var(--muted)">Aucune séance avec données météo disponibles.</div>';

    // Ensure selectedDay is valid
    if (!selectedDay || !dates.includes(selectedDay)) {
      selectedDay = dates[0];
    }

    // Build horizontal day nav
    const navHtml = dates.map(date => {
      const d = new Date(date + 'T12:00:00');
      const dayLabel = d.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });
      const isActive = date === selectedDay;
      return `<button data-active="${isActive ? '1' : '0'}" onclick="selectDay('${date}')" style="
          white-space:nowrap;padding:6px 14px;border-radius:20px;border:1px solid;
          cursor:pointer;font-size:0.82rem;transition:all 0.2s;
          ${isActive
            ? 'background:#e94560;color:#fff;border-color:#e94560;'
            : 'background:transparent;color:#aaa;border-color:#3a3a5a;'}
        ">${dayLabel}</button>`;
    }).join('');

    // Show only selected day's sessions
    const rawDay = (groups[selectedDay] || []);
    let rowsHtml, theadHtml;

    if (groupByFilm) {
      const grouped = new Map();
      rawDay.forEach(s => {
        const key = `${s.cinema}|||${s.film}|||${s.version}`;
        if (!grouped.has(key)) grouped.set(key, { cinema: s.cinema, film: s.film, version: s.version, sessions: [] });
        grouped.get(key).sessions.push(s);
      });
      const groupList = [...grouped.values()].sort((a, b) =>
        a.cinema.localeCompare(b.cinema) || a.film.localeCompare(b.film) || (a.version || '').localeCompare(b.version || '')
      );
      rowsHtml  = groupList.map(buildGroupedRowJour).join('');
      theadHtml = `<tr><th>Cinéma</th><th>Film</th><th>Durée</th>${advancedHeaders()}<th>Séances</th></tr>`;
    } else {
      const sorted = rawDay.slice().sort((a, b) => a.cinema.localeCompare(b.cinema) || a.heure.localeCompare(b.heure));
      rowsHtml  = sorted.map(buildRowJour).join('');
      theadHtml = `<tr><th>Cinéma</th><th>Heure</th><th>Durée</th><th>Film</th>${advancedHeaders()}<th>🌡️</th><th></th></tr>`;
    }

    const d = new Date(selectedDay + 'T12:00:00');
    const fullLabel = d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
    const capitalized = fullLabel.charAt(0).toUpperCase() + fullLabel.slice(1);

    return `<div id="day-nav">${navHtml}</div>
      <div class="group">
        <div class="group-header">${capitalized}</div>
        <table>
          <thead>${theadHtml}</thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>`;
  }

  /* ────────────────────────────────────────────
     Render Vue B — Par cinéma
  ──────────────────────────────────────────── */
  function renderViewCinema(sessions) {
    const groups = {};
    for (const s of sessions) {
      if (!groups[s.cinema]) groups[s.cinema] = [];
      groups[s.cinema].push(s);
    }
    const cinemas = Object.keys(groups).sort();

    if (cinemas.length === 0) return '';

    return cinemas.map(cinema => {
      let rowsHtml, theadHtml;
      if (groupByFilm) {
        const grouped = new Map();
        groups[cinema].forEach(s => {
          const key = `${s.film}|||${s.date}|||${s.version}`;
          if (!grouped.has(key)) grouped.set(key, { film: s.film, date: s.date, version: s.version, sessions: [] });
          grouped.get(key).sessions.push(s);
        });
        const groupList = [...grouped.values()].sort((a, b) =>
          a.date.localeCompare(b.date) || a.film.localeCompare(b.film) || (a.version || '').localeCompare(b.version || '')
        );
        rowsHtml  = groupList.map(buildGroupedRowCinema).join('');
        theadHtml = `<tr><th>Date</th><th>Film</th><th>Durée</th>${advancedHeaders()}<th>Séances</th></tr>`;
      } else {
        const sorted = groups[cinema].slice().sort((a, b) => {
          const d = a.date.localeCompare(b.date);
          return d !== 0 ? d : a.heure.localeCompare(b.heure);
        });
        rowsHtml  = sorted.map(buildRowCinema).join('');
        theadHtml = `<tr><th>Date</th><th>Heure</th><th>Durée</th><th>Film</th>${advancedHeaders()}<th>🌡️</th><th></th></tr>`;
      }
      return `<div class="group">
        <div class="group-header">${escHtml(cinema)}</div>
        <table>
          <thead>${theadHtml}</thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>`;
    }).join('');
  }

  /* ────────────────────────────────────────────
     Apply filters + re-render
  ──────────────────────────────────────────── */
  function applyFilters() {
    const sessions = getFilteredSessions();
    const container = document.getElementById('view-container');
    const summaryEl = document.getElementById('summary-container');
    const empty     = document.getElementById('empty-state');

    if (summaryEl) {
      summaryEl.innerHTML = renderTempSummary(getFilteredSessions());
    }

    let html = '';
    if (currentView === 'jour') {
      html = renderViewJour(sessions);
    } else {
      html = renderViewCinema(sessions);
    }

    if (!html) {
      container.innerHTML = '';
      empty.style.display = 'block';
    } else {
      container.innerHTML = html;
      empty.style.display = 'none';
    }
  }

  /* ────────────────────────────────────────────
     View switch
  ──────────────────────────────────────────── */
  function switchView(view) {
    currentView = view;
    document.getElementById('btn-jour').classList.toggle('active',   view === 'jour');
    document.getElementById('btn-cinema').classList.toggle('active', view === 'cinema');
    applyFilters();
  }

  function setCinemasAll(checked) {
    document.querySelectorAll('#cinema-checks input[type="checkbox"]').forEach(cb => cb.checked = checked);
    if (checked) {
      allCinemas.forEach(c => selectedCinemas.add(c));
    } else {
      selectedCinemas.clear();
    }
    applyFilters();
  }

  /* ────────────────────────────────────────────
     Init
  ──────────────────────────────────────────── */
  function init() {
    // Meta info
    const metaEl = document.getElementById('meta');
    if (DATA.updated_at) {
      const dt = new Date(DATA.updated_at).toLocaleString('fr-FR');
      const n  = DATA.sessions.length;
      metaEl.textContent = `Mis à jour : ${dt} — ${n} séance${n !== 1 ? 's' : ''}`;
    } else {
      metaEl.textContent = 'Aucune donnée disponible';
    }

    // Build cinema checkboxes
    allCinemas = [...new Set(DATA.sessions.map(s => s.cinema))].sort();
    selectedCinemas = new Set(allCinemas);

    const container = document.getElementById('cinema-checks');
    if (allCinemas.length === 0) {
      container.innerHTML = '<span style="color:var(--muted);font-size:.8rem">Aucun cinéma</span>';
    } else {
      container.innerHTML = allCinemas.map(c => {
        const id = 'chk-' + c.replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-]/g, '');
        return `<label>
          <input type="checkbox" id="${id}" value="${escHtml(c)}" checked
            onchange="toggleCinema('${escHtml(c)}', this.checked)">
          ${escHtml(c)}
        </label>`;
      }).join('');
    }

    // Initial render
    applyFilters();
  }

  function toggleCinema(cinema, checked) {
    if (checked) {
      selectedCinemas.add(cinema);
    } else {
      selectedCinemas.delete(cinema);
    }
    applyFilters();
  }

  fetch('sessions.json')
    .then(r => r.json())
    .then(data => {
      DATA = data;
      init();
    })
    .catch(() => {
      document.getElementById('meta').textContent = 'Erreur de chargement des données.';
    });
</script>
</body>
</html>
